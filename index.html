<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atendimento Brainsoft</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #0057b8, #003f88);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    width: 420px;
    padding: 30px;
    border-radius: 14px;
    text-align: center;
}
.spinner {
    border: 4px solid #eee;
    border-top: 4px solid #0057b8;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    animation: spin 1s linear infinite;
    margin: 15px auto;
}
@keyframes spin {
    100% { transform: rotate(360deg); }
}
.button {
    background: #0057b8;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
}
.hidden { display:none; }
</style>

</head>
<body>

<div class="container">
    <h2>Brainsoft Sistemas</h2>
    <div id="info"></div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Conectando...</p>
    </div>

    <button id="btn" class="button hidden" onclick="abrirChat()">
        Abrir chat
    </button>
</div>

<script>
function getParam(name){
    return new URL(window.location.href).searchParams.get(name)||"";
}

var dados = {
    nome: getParam("nome"),
    email: getParam("email"),
    cartorio_nome: getParam("cartorio_nome"),
    cidade: getParam("cartorio_cidade"),
    uf: getParam("cartorio_uf")
};

document.getElementById("info").innerHTML =
    "<b>"+dados.nome+"</b><br>"+dados.cartorio_nome;

var Tawk_API = Tawk_API||{};
var carregou=false;

Tawk_API.onLoad=function(){
    carregou=true;

    document.getElementById("loading").classList.add("hidden");

    Tawk_API.setAttributes({
        name: dados.nome,
        email: dados.email,
        machine_id: getParam("machine_id")
    });

    setTimeout(function(){
        Tawk_API.setAttributes({
            cartorio_nome:getParam("cartorio_nome"),
            cartorio_cns:getParam("cartorio_cns"),
            cartorio_cidade:getParam("cartorio_cidade"),
            cartorio_uf:getParam("cartorio_uf"),
            cartorio_oficial:getParam("cartorio_oficial"),
            versao_imob:getParam("versao_imob"),
            versao_postgres:getParam("versao_postgres")
        });
    },1000);

    Tawk_API.maximize();
};

setTimeout(function(){
    if(!carregou){
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("btn").classList.remove("hidden");
    }
},6000);

function abrirChat(){
    if(Tawk_API) Tawk_API.maximize();
}

(function(){
    var s1=document.createElement("script");
    var s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src="https://embed.tawk.to/SEU_ID_AQUI/default";
    s0.parentNode.insertBefore(s1,s0);
})();
</script>

</body>
</html>
